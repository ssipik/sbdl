name: Build and Test

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: '3.12.13'

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest
